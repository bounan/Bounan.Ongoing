packages:
  - packages/*
  - third-party/common/ts

allowBuilds:
  esbuild: true

blockExoticSubdeps: true

catalog:
  '@aws-sdk/client-dynamodb': 3.975.0
  '@aws-sdk/client-lambda': 3.975.0
  '@aws-sdk/client-ssm': 3.975.0
  '@aws-sdk/lib-dynamodb': 3.975.0
  '@eslint/js': 9.39.2
  '@lightweight-clients/jikan-api-lightweight-client': 4.0.2
  '@types/aws-lambda': 8.10.160
  '@types/node': 25.0.10
  '@vitest/coverage-v8': 4.0.18
  '@vitest/ui': 4.0.18
  aws-cdk: 2.1103.0
  aws-cdk-lib: 2.236.0
  aws-sdk-client-mock: 4.1.0
  cdk-lambda-llrt: 0.1.4
  constructs: 10.4.5
  cross-env: 10.1.0
  eslint: 9.39.2
  eslint-plugin-simple-import-sort: 12.1.1
  jiti: 2.6.1
  knip: 5.82.1
  msw: 2.12.7
  npm-run-all2: 9.0.2
  typescript: 5.9.3
  typescript-eslint: 8.53.1
  vitest: 4.0.18

# Delay newly published versions for one day to reduce supply-chain risk.
minimumReleaseAge: 1440

# Use hoisted node linker for compatibility with LlrtFunction construct. This construct bundles
# dependencies using docker, which does not work with host's symlinks.
nodeLinker: hoisted

onlyBuiltDependencies:
  - aws-sdk
  - esbuild
  - msw

trustPolicy: no-downgrade
